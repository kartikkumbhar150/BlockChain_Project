version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: credential-postgres
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: credentials
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: credential-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
